name: Freeze Dependency Lock

# Manual-only: resolve the full dependency set on the deploy Python and emit an
# exact-pin lock (requirements.lock). Download the artifact and commit it so
# every deploy resolves to the same, tested native stack instead of whatever
# the ranges happen to pick that day (the redeploy-roulette that caused the
# July 11 segfault/build breakage).
on:
  workflow_dispatch:

jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python (match Streamlit Cloud runtime)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Resolve and freeze
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt
          echo "# Generated by .github/workflows/freeze-deps.yml on Python 3.13 (linux x86_64)." > requirements.lock
          echo "# Do not edit by hand — re-run the Freeze Dependency Lock workflow to update." >> requirements.lock
          python -m pip freeze >> requirements.lock
          echo "--- lock head ---"
          head -20 requirements.lock

      - name: Upload lock artifact
        uses: actions/upload-artifact@v4
        with:
          name: requirements-lock
          path: requirements.lock

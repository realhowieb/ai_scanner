name: Diagnostics

# Manual-only, read-only diagnostics against production data (e.g. locating
# out-of-range BreakoutScores in stored snapshots).
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Diagnostic script under scripts/ to run"
        required: true
        default: "diag_max_scores.py"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-core.txt -c requirements.lock
      - name: Run diagnostic
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_SCANNER_SQLITE_FALLBACK: "false"
          # Some diagnostics (e.g. track-record forward returns) need price bars.
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_DATA_URL: ${{ secrets.ALPACA_DATA_URL }}
        run: python "scripts/${{ inputs.script }}"

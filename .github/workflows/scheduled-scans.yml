name: Scheduled Market Scans

on:
  # Manual trigger (Actions tab) or external scheduler (e.g. Render cron) via the
  # API. `force` defaults true so a hand-run bypasses the weekend/premarket skip,
  # the alert cooldown, and the earnings throttle for on-demand testing. A
  # reliable external scheduler should pass force=false so runs behave like real
  # scheduled runs (throttled alerts, once-daily earnings).
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass weekend/throttle (manual testing). Set false for scheduled use."
        type: boolean
        default: true

  # Automated schedule (Mon–Fri, US market days)
  # Times below are in UTC (GitHub Actions runs on UTC):
  # 14:35 UTC  → 09:35 ET  (after open)
  # 17:00 UTC  → 12:00 ET  (midday)
  # 20:30 UTC  → 15:30 ET  (power hour)
  # 21:10 UTC  → 16:10 ET  (after close)
  schedule:
    - cron: '35 14 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 20 * * 1-5'
    - cron: '10 21 * * 1-5'

jobs:
  run-scans:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the Streamlit Cloud runtime and the requirements.lock platform
          # so the cron runs the exact same dependency stack as the app.
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-core.txt -c requirements.lock
          # ML group (xgboost/scikit-learn/joblib) so the cron can load the
          # PreBreakout / AI-Confidence models and actually score candidates —
          # required for the track-record ranking A/B to be meaningful.
          python -m pip install --prefer-binary -r requirements-ml.txt -c requirements.lock

      - name: Run scheduled scans
        env:
          # 🔑 Add these in GitHub → Settings → Secrets and variables → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_SCANNER_SQLITE_FALLBACK: "false"
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_DATA_URL: ${{ secrets.ALPACA_DATA_URL }}
          # SMTP (Resend) so the alert evaluator can email users from the cron.
          # These are a SEPARATE secret store from Streamlit Cloud — set them in
          # GitHub → Settings → Secrets and variables → Actions.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          # Optional error monitoring (no-op unless set).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Earnings calendar sources (FMP primary, Finnhub fallback).
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Pre-open morning digest (Pro+). Off unless the secret is set to "1".
          # Sent once/day on the first scan run; a forced manual run re-sends.
          MORNING_DIGEST_ENABLED: ${{ secrets.MORNING_DIGEST_ENABLED }}
          MORNING_DIGEST_MAX_USERS: ${{ secrets.MORNING_DIGEST_MAX_USERS }}
          CRON_SUMMARY_PATH: artifacts/scheduled_scan_summary.json
          # Skip the slow per-symbol yfinance fallback for symbols Alpaca doesn't
          # carry (micro-caps/warrants that never pass filters) — big speedup.
          PRICE_SKIP_YF_FALLBACK: "1"
          # Manual "Run workflow" forces a run (bypasses weekend/premarket skip);
          # scheduled runs respect the skip.
          CRON_FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '0' }}
          # Manual runs also bypass the per-alert cooldown so alerts can be
          # tested on demand; scheduled runs keep the normal 12h throttle.
          ALERT_THROTTLE_HOURS: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '0' || '12' }}
        run: python -m scheduler.cron_runner

      - name: Upload scheduled scan summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-scan-summary
          path: artifacts/scheduled_scan_summary.json
          if-no-files-found: warn

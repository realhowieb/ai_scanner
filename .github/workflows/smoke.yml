name: Smoke Checks

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m compileall -q .

      - name: Import smoke checks
        run: |
          python -c "import config"
          python -c "import scheduler.cron_runner"
          python -c "from scheduler.cron_runner import _load_universe; assert _load_universe('SP500')"

      - name: Run unit smoke tests
        run: python -m unittest discover -s tests -v

  dependency-import-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt

      - name: Import app modules
        run: |
          python -c "import data.provider_diagnostics"
          python -c "import data.prices"
          python -c "import data.fetch"
          python -c "import scan.breakout"
          python -c "import scan.engine"
          python -c "import db.runs"
          python -c "import ui.scans"
